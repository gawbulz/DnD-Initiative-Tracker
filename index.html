<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Tracker App</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1>Initiative Tracker</h1>
      <div class="header-actions">
        <button id="add-row">Add row</button>
        <button id="sort-rows">Sort</button>
        <button id="reset-rows" class="reset-button">Reset</button>
      </div>
    </header>
    <div class="rows-heading">
      <span>Name</span>
      <span>Initiative</span>
      <span></span>
      <span></span>
    </div>
    <main class="rows-list" id="rows"></main>
  </div>
  <div class="footer">
    <p>Made by <a href="https://github.com/gawbulz/DnD-Initiative-Tracker" target="_blank">Gawbulz</a></p>
    <p>If you want to support me click <a href="https://www.buymeacoffee.com/gawbulz" target="_blank">here</a></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
